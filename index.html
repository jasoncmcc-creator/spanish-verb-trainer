<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Spanish Verb Trainer</title>

<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="manifest" href="manifest.json">

<style>

body{
font-family:Arial;
background:#f3f4f6;
margin:auto;
max-width:700px;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 2px 6px rgba(0,0,0,.1);
}

button{
background:#2563eb;
color:white;
border:none;
padding:12px;
border-radius:8px;
margin:5px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.answer{
display:block;
width:100%;
background:#e5e7eb;
color:black;
margin:6px 0;
}

.correct{background:#22c55e !important;color:white;}
.wrong{background:#ef4444 !important;color:white;}

input{
width:100%;
padding:10px;
margin-top:10px;
}

.tense-grid{
columns:2;
}

.small{color:#666;font-size:14px}

</style>
</head>

<body>

<h1>Spanish Verb Trainer</h1>

<div class="card">

<h3>Mode</h3>

<label><input type="radio" name="mode" value="mc" checked>Multiple Choice</label>
<label><input type="radio" name="mode" value="write">Write Answer</label>

<h3>Tenses</h3>

<label><input type="checkbox" id="allTenses" checked>Select All</label>

<div class="tense-grid" id="tenseList"></div>

<br>

<button onclick="startPractice()">Start Practice</button>
<button onclick="practiceMistakes()">Practice Mistakes</button>

</div>

<div class="card" id="practice" style="display:none">

<h2 id="question"></h2>

<div id="answers"></div>

<input id="writeBox" placeholder="Type answer">
<button id="submitBtn">Submit</button>

<p id="feedback"></p>

<button onclick="nextQuestion()">Next</button>

</div>

<script src="verbs.js" defer></script>
<script src="app.js" defer></script>

</body>
</html>
